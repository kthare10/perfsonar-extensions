services:
  perfsonar-testpoint:
    build:
      context: .
      dockerfile: Dockerfile-perfsonar-testpoint
    container_name: perfsonar-testpoint
    network_mode: "host"
    image: kthare10/perfsonar-testpoint:systemd
    privileged: true
    cgroupns: host
    tty: true
    stdin_open: true
    environment:
      - HOSTS=${HOSTS:-23.134.232.50@shore-STAR}
      - AUTH_TOKEN=${AUTH_TOKEN:-changeme}
      - ARCHIVE_URLS=${ARCHIVE_URLS:-https://localhost:8443/ps}
      - TZ=${TZ:-UTC}
      - CRON_EXPRESSION=${CRON_EXPRESSION:-0 */2 * * *}
    tmpfs:
      - /run:size=256m
      - /run/lock:size=16m
      - /tmp:size=512m
    volumes:
      - ./pscheduler_test_runner.py:/usr/src/app/periodic.py
      - ./data_testpoint:/data
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./compose/psconfig:/etc/perfsonar/psconfig
    mem_limit: 4g
    cpus: 4
    healthcheck:
      test: ["CMD-SHELL", "curl -sf https://localhost/pscheduler -k || pscheduler ping"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
