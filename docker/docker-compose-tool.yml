services:
  perfsonar-tool:
    build:
      context: .
      dockerfile: Dockerfile-perfsonar-tool
    container_name: perfsonar-tool
    image: kthare10/perfsonar-tool
    tty: true
    stdin_open: true
    environment:
      - "HOSTS=23.134.232.210 23.134.232.242"
      - TZ=UTC
      - "INTERVAL=0 */6 * * *"
    volumes:
      - ./data_tools:/data
    mem_limit: 4g
    cpus: 4
    healthcheck:
      test: ["CMD-SHELL", "pgrep cron || pgrep crond"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
